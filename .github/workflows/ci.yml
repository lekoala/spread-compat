name: CI

on: [push, pull_request]

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: zip, gd
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Composer install
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: PHP Code Sniffer
        run: vendor/bin/phpcs --standard=phpcs.xml.dist src/

      - name: PHPStan
        run: vendor/bin/phpstan analyse src/

  test:
    name: PHPUnit PHP ${{ matrix.php }} / PhpSpreadsheet ${{ matrix.phpss }} / OpenSpout ${{ matrix.openspout }}
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3", "8.4", "8.5"]
        phpss: ["^1.26", "^5.0"]
        openspout: ["^4.24", "^5.0"]

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: zip, gd
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Composer install
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: Pin PhpSpreadsheet version
        run: composer update phpoffice/phpspreadsheet:${{ matrix.phpss }} --no-interaction --no-progress --prefer-dist

      - name: Pin OpenSpout version
        run: composer update openspout/openspout:${{ matrix.openspout }} --no-interaction --no-progress --prefer-dist

      - name: PHPUnit
        run: vendor/bin/phpunit --configuration phpunit.xml.dist
